server:
  port: 8081

spring:
  application:
    name: ai-knowledge-base
  datasource:
    url: jdbc:h2:file:./data/ai-knowledge-base;MODE=MySQL;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  sql:
    init:
      mode: always
      continue-on-error: true

app:
  token-secret: ${APP_TOKEN_SECRET:local-dev-ai-knowledge-base-secret}
