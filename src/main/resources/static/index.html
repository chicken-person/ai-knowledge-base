<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 文档知识库</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --surface-soft: #edf4f8;
      --ink: #17202a;
      --muted: #637083;
      --line: #d8e2ec;
      --primary: #1769aa;
      --primary-strong: #0f4f87;
      --green: #1f8a5b;
      --amber: #a95f00;
      --red: #b42318;
      --shadow: 0 16px 36px rgba(31, 52, 76, 0.12);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: linear-gradient(180deg, rgba(23, 105, 170, 0.10), rgba(255,255,255,0) 270px), var(--bg);
    }

    button, input, textarea { font: inherit; }

    button {
      min-height: 38px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      color: #fff;
      background: var(--primary);
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { background: var(--primary-strong); }
    button.secondary { color: var(--ink); background: #e6edf3; }
    button.secondary:hover { background: #d7e1eb; }
    button.danger { background: var(--red); }
    button.danger:hover { background: #8f1b13; }
    button.ghost { color: var(--primary); background: transparent; border: 1px solid var(--line); }
    button:disabled { opacity: 0.55; cursor: not-allowed; }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      line-height: 1.6;
    }

    input:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(23, 105, 170, 0.14);
    }

    .shell {
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 34px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 12px 0 22px;
    }

    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }

    .mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #fff;
      background: linear-gradient(135deg, #1769aa, #1f8a5b);
      font-weight: 900;
    }

    h1 { margin: 0; font-size: 25px; line-height: 1.2; letter-spacing: 0; }
    h2 { margin: 0; font-size: 15px; }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .account {
      display: grid;
      grid-template-columns: minmax(120px, 170px) minmax(120px, 170px) auto auto;
      align-items: center;
      gap: 8px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--green);
      background: #e5f4ec;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

    .layout {
      display: grid;
      grid-template-columns: 380px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .stack { display: grid; gap: 18px; }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.96);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 15px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
    }

    .panel-body { padding: 16px; }

    .field { display: grid; gap: 7px; margin-bottom: 12px; }
    label { color: var(--muted); font-size: 13px; font-weight: 800; }

    .actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px 15px;
      background: var(--surface);
    }

    .stat strong { display: block; font-size: 24px; line-height: 1.1; margin-bottom: 4px; }
    .stat span { color: var(--muted); font-size: 13px; font-weight: 800; }

    .workbench {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(300px, 0.8fr);
      gap: 18px;
      align-items: start;
    }

    .answer {
      min-height: 190px;
      border: 1px solid #cfe0ef;
      border-radius: 8px;
      padding: 16px;
      background: #f8fbfe;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .confidence {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--primary);
      font-size: 13px;
      font-weight: 900;
    }

    .bar {
      width: 120px;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: #dce8f2;
    }

    .bar span { display: block; height: 100%; width: 0; background: linear-gradient(90deg, #1769aa, #1f8a5b); }

    .list { display: grid; gap: 10px; }

    .item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: var(--surface);
    }

    .item-title { font-weight: 900; overflow-wrap: anywhere; }
    .meta { margin-top: 5px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .snippet { margin-top: 8px; color: var(--ink); line-height: 1.58; overflow-wrap: anywhere; }

    .mini-actions { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
    .mini-actions button { min-height: 32px; padding: 0 10px; font-size: 13px; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      z-index: 10;
      max-width: min(420px, calc(100vw - 40px));
      padding: 12px 14px;
      border-radius: 8px;
      color: #fff;
      background: #17202a;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(90px);
      transition: 0.2s ease;
    }

    .toast.show { opacity: 1; transform: translateY(0); }
    .hidden { display: none !important; }

    @media (max-width: 1120px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .account { width: 100%; grid-template-columns: 1fr 1fr auto; }
      .pill { grid-column: 1 / -1; width: fit-content; }
      .layout, .workbench { grid-template-columns: 1fr; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 620px) {
      .shell { width: min(100% - 20px, 1480px); padding-top: 14px; }
      .account, .stats, .two-col { grid-template-columns: 1fr; }
      .actions button { width: 100%; }
      .mini-actions button { width: auto; flex: 1 1 120px; }
      h1 { font-size: 22px; }
      .subtitle { white-space: normal; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark">AI</div>
        <div>
          <h1>AI 文档知识库</h1>
          <div class="subtitle">Spring Boot · 本地向量检索 · RAG 问答闭环</div>
        </div>
      </div>
      <div class="account">
        <input id="username" value="demo" aria-label="用户名" />
        <input id="password" value="demo123456" type="password" aria-label="密码" />
        <button id="loginBtn">登录</button>
        <span class="pill"><span class="dot"></span><span id="loginState">未登录</span></span>
      </div>
    </header>

    <main class="layout">
      <aside class="stack">
        <section class="panel">
          <div class="panel-head">
            <h2>文档入库</h2>
            <button class="secondary" id="sampleBtn">示例</button>
          </div>
          <div class="panel-body">
            <div class="field">
              <label for="docTitle">文档标题</label>
              <input id="docTitle" value="Redis 缓存治理方案" />
            </div>
            <div class="field">
              <label for="originalName">文件名</label>
              <input id="originalName" value="redis-cache-plan.md" />
            </div>
            <div class="field">
              <label for="docContent">文档内容</label>
              <textarea id="docContent">Redis 在后端项目中可以用于热点数据缓存、验证码缓存、接口限流和分布式锁。缓存穿透可以用布隆过滤器或空值缓存处理，缓存击穿可以用互斥锁或逻辑过期处理，缓存雪崩可以通过随机过期时间和多级缓存降低风险。</textarea>
            </div>
            <div class="actions">
              <button id="uploadBtn">上传文档</button>
              <button class="secondary" id="refreshBtn">刷新</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head"><h2>文档资产</h2></div>
          <div class="panel-body">
            <div id="docsList" class="list"></div>
          </div>
        </section>
      </aside>

      <section class="stack">
        <div class="stats">
          <div class="stat"><strong id="docCount">0</strong><span>文档数</span></div>
          <div class="stat"><strong id="chunkCount">0</strong><span>文本片段</span></div>
          <div class="stat"><strong id="conversationCount">0</strong><span>问答记录</span></div>
          <div class="stat"><strong id="referenceCount">0</strong><span>本次引用</span></div>
        </div>

        <div class="workbench">
          <section class="panel">
            <div class="panel-head">
              <h2>知识库问答</h2>
              <div class="confidence">
                <span id="confidenceText">匹配度 0.000</span>
                <span class="bar"><span id="confidenceBar"></span></span>
              </div>
            </div>
            <div class="panel-body">
              <div class="field">
                <label for="question">问题</label>
                <input id="question" value="Redis 在项目里能解决什么问题？" />
              </div>
              <div class="actions">
                <button id="askBtn">提问</button>
                <button class="secondary" id="questionBtn">换题</button>
              </div>
              <div id="answerBox" class="answer" style="margin-top:14px;">知识库已就绪。</div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head"><h2>检索证据</h2></div>
            <div class="panel-body">
              <div id="sourceList" class="list"></div>
            </div>
          </section>
        </div>

        <div class="workbench">
          <section class="panel">
            <div class="panel-head"><h2>分块预览</h2><span class="pill" id="selectedDoc">未选择</span></div>
            <div class="panel-body">
              <div id="chunkList" class="list"></div>
            </div>
          </section>

          <section class="panel">
            <div class="panel-head"><h2>问答历史</h2></div>
            <div class="panel-body">
              <div id="historyList" class="list"></div>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const state = { token: localStorage.getItem("aiKbToken") || "", user: null, documents: [], conversations: [], references: [] };
    const questions = [
      "Redis 在项目里能解决什么问题？",
      "MySQL 索引设计要注意什么？",
      "RAG 问答的核心流程是什么？",
      "这个项目面试时应该怎么讲亮点？"
    ];

    function toast(message) {
      const box = $("toast");
      box.textContent = message;
      box.classList.add("show");
      clearTimeout(box.timer);
      box.timer = setTimeout(() => box.classList.remove("show"), 2600);
    }

    async function api(path, options = {}) {
      const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
      if (state.token) headers.Authorization = `Bearer ${state.token}`;
      const res = await fetch(path, { ...options, headers });
      const body = await res.json().catch(() => ({}));
      if (!res.ok || body.success === false) throw new Error(body.message || `请求失败：${res.status}`);
      return body.data;
    }

    async function login(showToast = true) {
      const data = await api("/api/auth/login", {
        method: "POST",
        body: JSON.stringify({ username: $("username").value, password: $("password").value })
      });
      state.token = data.token;
      state.user = data.user;
      localStorage.setItem("aiKbToken", state.token);
      $("loginState").textContent = `已登录：${data.user.username}`;
      await refreshAll();
      if (showToast) toast("登录成功");
    }

    async function uploadDocument() {
      $("uploadBtn").disabled = true;
      try {
        await api("/api/documents", {
          method: "POST",
          body: JSON.stringify({
            title: $("docTitle").value,
            originalName: $("originalName").value,
            content: $("docContent").value
          })
        });
        await refreshAll();
        toast("文档已入库");
      } finally {
        $("uploadBtn").disabled = false;
      }
    }

    async function askQuestion() {
      $("askBtn").disabled = true;
      try {
        const data = await api("/api/ask", {
          method: "POST",
          body: JSON.stringify({ question: $("question").value, topK: 3 })
        });
        state.references = data.references || [];
        $("answerBox").textContent = data.answer;
        renderConfidence(data.confidence || 0);
        renderSources();
        await loadDashboard();
        await loadHistory();
        toast("问答已生成");
      } finally {
        $("askBtn").disabled = false;
      }
    }

    async function refreshAll() {
      await Promise.all([loadDashboard(), loadDocuments(), loadHistory()]);
    }

    async function loadDashboard() {
      const data = await api("/api/dashboard");
      $("docCount").textContent = data.documentCount;
      $("chunkCount").textContent = data.chunkCount;
      $("conversationCount").textContent = data.conversationCount;
      $("referenceCount").textContent = state.references.length;
    }

    async function loadDocuments() {
      state.documents = await api("/api/documents");
      renderDocuments();
    }

    async function loadHistory() {
      state.conversations = await api("/api/conversations");
      renderHistory();
    }

    async function showChunks(id) {
      const doc = state.documents.find(row => row.id === id);
      $("selectedDoc").textContent = doc ? doc.title : "已选择";
      const chunks = await api(`/api/documents/${id}/chunks`);
      $("chunkList").innerHTML = chunks.map(chunk => `
        <article class="item">
          <div class="item-title">片段 ${chunk.chunkIndex + 1}</div>
          <div class="snippet">${escapeHtml(chunk.content)}</div>
        </article>
      `).join("") || empty("暂无分块");
    }

    async function reindexDocument(id) {
      await api(`/api/documents/${id}/reindex`, { method: "POST" });
      await refreshAll();
      await showChunks(id);
      toast("索引已重建");
    }

    async function deleteDocument(id) {
      await api(`/api/documents/${id}`, { method: "DELETE" });
      $("selectedDoc").textContent = "未选择";
      $("chunkList").innerHTML = empty("选择文档查看分块");
      await refreshAll();
      toast("文档已删除");
    }

    function renderDocuments() {
      $("docsList").innerHTML = state.documents.map(doc => `
        <article class="item">
          <div class="item-title">${escapeHtml(doc.title)}</div>
          <div class="meta">${escapeHtml(doc.originalName || "manual-input.txt")} · ${doc.chunkCount} 个片段 · ${formatTime(doc.createdAt)}</div>
          <div class="mini-actions">
            <button class="secondary" data-action="chunks" data-id="${doc.id}">分块</button>
            <button class="ghost" data-action="reindex" data-id="${doc.id}">重建索引</button>
            <button class="danger" data-action="delete" data-id="${doc.id}">删除</button>
          </div>
        </article>
      `).join("") || empty("暂无文档");
    }

    function renderSources() {
      $("referenceCount").textContent = state.references.length;
      $("sourceList").innerHTML = state.references.map((hit, index) => `
        <article class="item">
          <div class="item-title">${index + 1}. ${escapeHtml(hit.title)}</div>
          <div class="meta">score ${Number(hit.score).toFixed(3)}</div>
          <div class="snippet">${escapeHtml(hit.content)}</div>
        </article>
      `).join("") || empty("暂无引用");
    }

    function renderHistory() {
      $("historyList").innerHTML = state.conversations.map(row => `
        <article class="item">
          <div class="item-title">${escapeHtml(row.question)}</div>
          <div class="meta">${formatTime(row.createdAt)}</div>
          <div class="snippet">${escapeHtml(trim(row.answer, 120))}</div>
        </article>
      `).join("") || empty("暂无历史");
    }

    function renderConfidence(value) {
      const score = Math.max(0, Math.min(1, Number(value) || 0));
      $("confidenceText").textContent = `匹配度 ${score.toFixed(3)}`;
      $("confidenceBar").style.width = `${Math.round(score * 100)}%`;
    }

    function sample() {
      $("docTitle").value = "Java 后端项目面试笔记";
      $("originalName").value = "backend-interview.md";
      $("docContent").value = "MySQL 索引可以提升查询效率，但需要考虑区分度、回表成本和写入开销。Redis 适合热点缓存、验证码缓存、接口限流和分布式锁。Spring Boot 项目要讲清楚分层设计、异常处理、参数校验、事务边界和测试覆盖。";
    }

    function switchQuestion() {
      const current = questions.indexOf($("question").value);
      $("question").value = questions[(current + 1 + questions.length) % questions.length];
    }

    function empty(text) {
      return `<div class="item"><div class="meta">${escapeHtml(text)}</div></div>`;
    }

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, ch => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[ch]));
    }

    function trim(value, max) {
      const text = String(value || "").replace(/\s+/g, " ").trim();
      return text.length > max ? `${text.slice(0, max)}...` : text;
    }

    function formatTime(value) {
      if (!value) return "";
      return new Date(value).toLocaleString("zh-CN", { hour12: false });
    }

    $("loginBtn").addEventListener("click", () => login().catch(err => toast(err.message)));
    $("uploadBtn").addEventListener("click", () => uploadDocument().catch(err => toast(err.message)));
    $("refreshBtn").addEventListener("click", () => refreshAll().then(() => toast("数据已刷新")).catch(err => toast(err.message)));
    $("askBtn").addEventListener("click", () => askQuestion().catch(err => toast(err.message)));
    $("questionBtn").addEventListener("click", switchQuestion);
    $("sampleBtn").addEventListener("click", sample);
    $("docsList").addEventListener("click", (event) => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const id = Number(button.dataset.id);
      const actions = { chunks: showChunks, reindex: reindexDocument, delete: deleteDocument };
      actions[button.dataset.action](id).catch(err => toast(err.message));
    });

    login(false).catch(() => {
      $("loginState").textContent = "未登录";
      $("docsList").innerHTML = empty("请先登录");
      $("historyList").innerHTML = empty("请先登录");
      $("chunkList").innerHTML = empty("选择文档查看分块");
    });
  </script>
</body>
</html>
